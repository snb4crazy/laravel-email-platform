name: Deploy – Staging

# ── Triggers ────────────────────────────────────────────────────────────────
# Auto-deploys when CI passes on the develop / staging branch.
# Can also be triggered manually (workflow_dispatch) for any ref.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop, staging]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy"
        required: true
        default: "develop"

# Prevent two concurrent staging deploys
concurrency:
  group: deploy-staging
  cancel-in-progress: false    # queue, don't cancel — safer for DB migrations

# ── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── Guard: only proceed when the upstream CI run succeeded ───────────────
  guard:
    name: CI passed guard
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding to deploy"

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: guard
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}   # visible in GitHub deployments tab

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.event.workflow_run.head_branch }}

      # ── Build PHP deps (no dev, optimised) ──────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies (production)
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      # ── Build frontend assets ────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── Write version file (useful for /api/version smoke check) ─────────
      - name: Write version file
        run: |
          echo "{\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref_name }}\",\"deployed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > public/version.json

      # ── Transfer files to server via rsync over SSH ───────────────────────
      # Secrets required (set in GitHub → Settings → Environments → staging):
      #   STAGING_SSH_KEY   private key (RSA/ED25519)
      #   STAGING_HOST      server IP or hostname
      #   STAGING_USER      SSH username (e.g. deploy)
      #   STAGING_PATH      remote deploy path (e.g. /var/www/staging)
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_deploy
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='storage/logs' \
            --exclude='storage/framework/sessions' \
            -e "ssh -i ~/.ssh/id_deploy" \
            ./ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_PATH }}/

      # ── Run post-deploy Laravel commands on the server ────────────────────
      - name: Run post-deploy commands
        run: |
          ssh -i ~/.ssh/id_deploy \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd ${{ secrets.STAGING_PATH }} && \
             php artisan down --render='errors::503' && \
             php artisan migrate --force && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan queue:restart && \
             php artisan up"

  # ── Smoke test ────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for server to warm up
        run: sleep 10

      - name: Health check — /api/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ vars.STAGING_URL }}/api/health")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with HTTP $STATUS"
            exit 1
          fi

      - name: Content check — status=ok
        run: |
          BODY=$(curl -s "${{ vars.STAGING_URL }}/api/health")
          echo "Body: $BODY"
          echo "$BODY" | grep -q '"status":"ok"' || \
            (echo "Unexpected response body" && exit 1)

      - name: Version check — /api/version
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ vars.STAGING_URL }}/api/version")
          echo "Version status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Version check failed with HTTP $STATUS"
            exit 1
          fi

  # ── Notify ────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always()    # run even if previous jobs failed so you always get notified

    steps:
      - name: Report result
        run: |
          if [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "✅ Staging deploy succeeded: ${{ vars.STAGING_URL }}"
          else
            echo "❌ Staging deploy or smoke test FAILED"
            exit 1
          fi
        # ── Optional: replace the step above with a real Slack/Discord notification
        # - name: Slack notification
        #   uses: slackapi/slack-github-action@v2
        #   with:
        #     payload: |
        #       {"text": "Staging deploy: ${{ needs.smoke-test.result }} — ${{ vars.STAGING_URL }}"}
        #   env:
        #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

