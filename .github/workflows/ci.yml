name: CI

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["**"]          # every branch you push
  pull_request:
    branches: [master, main, develop]

# Cancel an in-progress run if a newer commit is pushed to the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Code style (Pint) ──────────────────────────────────────────────────
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pcov
          coverage: none          # not needed for lint
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint (dry-run)
        run: ./vendor/bin/pint --test

  # ── 2. Tests + coverage ───────────────────────────────────────────────────
  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint           # only run if lint passes

    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pcov, pdo_sqlite
          coverage: pcov
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy test environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test --coverage --coverage-clover=coverage.xml
        env:
          APP_ENV: testing
          APP_URL: http://localhost
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array

      - name: Upload coverage report
        if: matrix.php == '8.4'   # only upload once (the latest PHP run)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── 3. Frontend build ─────────────────────────────────────────────────────
  build-frontend:
    name: Frontend build (Node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: public/build
          retention-days: 7

